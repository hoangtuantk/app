<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công Cụ Ghép File</title>
    <link rel="icon" type="image/png" href="./img/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-900 flex items-center justify-center min-h-screen p-4">
    <div class="container bg-gray-800 p-8 rounded-2xl shadow-lg border-2 border-gray-700">
        <h1 class="text-3xl font-bold text-center text-gray-100 mb-6">Công Cụ Ghép File Đa Định Dạng</h1>
        <p class="text-center text-gray-300 mb-8">
            Chọn các tệp, thư mục hoặc tệp ZIP để gộp nội dung thành một tệp TXT duy nhất theo định dạng đã cho.
        </p>

        <div class="flex flex-col sm:flex-row items-center justify-center gap-4 mb-8">
            <label for="fileInput" class="cursor-pointer bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-xl shadow-md transition duration-300 ease-in-out">
                Chọn Tệp
            </label>
            <input type="file" id="fileInput" multiple class="hidden" />

            <label for="folderInput" class="cursor-pointer bg-green-600 hover:bg-green-700 text-white font-semibold py-3 px-6 rounded-xl shadow-md transition duration-300 ease-in-out">
                Chọn Thư Mục
            </label>
            <input type="file" id="folderInput" webkitdirectory multiple class="hidden" />

            <label for="zipInput" class="cursor-pointer bg-yellow-600 hover:bg-yellow-700 text-white font-semibold py-3 px-6 rounded-xl shadow-md transition duration-300 ease-in-out">
                Chọn Tệp ZIP
            </label>
            <input type="file" id="zipInput" accept=".zip" class="hidden" />
        </div>

        <div class="bg-gray-700 p-4 rounded-xl border border-gray-600 file-list-container mb-6">
            <h2 class="text-xl font-semibold text-gray-100 mb-2">Các Tệp Đã Chọn (<span id="fileCount">0</span>)</h2>
            <ul id="fileList" class="text-gray-300 text-sm">
                </ul>
        </div>
        
        <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
            <button id="mergeButton" class="w-full sm:w-auto bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition duration-300 ease-in-out focus:outline-none focus:ring-4 focus:ring-purple-300" disabled>
                Gộp và Tải Xuống
            </button>
            <button id="clearButton" class="w-full sm:w-auto bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition duration-300 ease-in-out focus:outline-none focus:ring-4 focus:ring-red-300" disabled>
                Xóa tất cả
            </button>
        </div>

        <div id="statusMessage" class="mt-6 text-center text-gray-400 font-medium"></div>

        <textarea id="mergedOutput" class="hidden"></textarea>

    </div>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
